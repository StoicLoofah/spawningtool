name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          # Install sc2reader from the canonical ggtracker upstream branch
          # first: parsing the latest StarCraft patches generally requires
          # sc2reader upstream rather than the most recent PyPI release.
          # Installing it here satisfies the sc2reader>=1.6.0 requirement so
          # `pip install .` won't pull the PyPI version over it.
          python -m pip install git+https://github.com/ggtracker/sc2reader.git@upstream
          python -m pip install .

      - name: Run tests
        run: python tests
